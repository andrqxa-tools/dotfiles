theme = "catppuccin_mocha"

[editor]
line-number = "relative"
cursorline = true
auto-save = true
rulers = [100]
bufferline = "multiple"
color-modes = true
true-color = true

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
