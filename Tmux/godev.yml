# Go dev session: ОДНЕ вікно, поділене на 4 панелі (2x2, tiled) — те саме,
# що вручну зібране вікно mabrook:1. Запускається обгорткою `godev [dir]`
# (див. Tmux/bin/godev), яка підставляє root=<каталог проєкту>.
# Symlink: ~/.config/smug/godev.yml -> цей файл.
session: godev
root: ${root}

windows:
  - name: dev
    layout: tiled
    panes:
      - type: horizontal
      - type: horizontal
      - type: horizontal
