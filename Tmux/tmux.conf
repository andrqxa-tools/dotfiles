# ============================================================
# Managed in dotfiles. OS-independent: the same file drives tmux
# (Linux/macOS) and psmux (Windows), which also reads a tmux-style config.
# The PLUGINS section at the bottom is TPM/tmux-only — psmux has no TPM, so
# that part is guarded and simply no-ops there.
# ============================================================

# ============================================================
# TERMINAL & COLORS
# ============================================================
# tmux-256color як внутрішній термінал tmux + true color overrides.
# RGB-override потрібен для коректних кольорів у Neovim (undercurl,
# diagnostics highlights), а *:Tc покриває більшість сучасних
# емуляторів (Alacritty, WezTerm, Ghostty, kitty, iTerm2).
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-overrides ",*:RGB"

# ============================================================
# CORE BEHAVIOR (важливо для Neovim + Claude Code)
# ============================================================
# Без затримки після Esc — інакше у Neovim Esc лагає на 50-500ms.
set -sg escape-time 0

# Focus events — щоб Neovim автоматично reload-ив файли,
# які змінив Claude Code ззовні (autoread працює лише з цим).
set -g focus-events on

# Великий scrollback — Claude Code виводить багато тексту.
set -g history-limit 50000

# Мишка: клік по панелях/вікнах, scroll wheel у buffer.
set -g mouse on

# OSC 52 — tmux сам пише виділення у системний буфер терміналу.
# Потрібно як ФОЛЛБЕК: на Windows/psmux (Windows Terminal розуміє OSC 52)
# копіювання йде саме через це, бо там немає wl-copy-both. На Linux/Wayland
# реальний шлях — wl-copy-both (див. COPY MODE), бо GNOME Terminal OSC 52
# НЕ підтримує; тут set-clipboard лишається лише для віддалених SSH-сесій
# з OSC 52-сумісним локальним емулятором.
set -g set-clipboard on

# Renumber windows коли якесь закриваєш (1,2,4 → 1,2,3).
set -g renumber-windows on

# PATH tmux-сервера: сервер часто стартує зі "голим" PATH без ~/.local/bin
# (login-shell не сорсить ~/.profile через .bash_profile-пастку), тож bare-команди
# з ~/.local/bin у copy-pipe/run-shell/tmux-yank не резолвляться (rc 127 → y копіює
# в нікуди). Додаємо ~/.local/bin в оточення tmux ОДИН раз — bare `wl-copy-both`
# знову знаходиться. tmux сам розкриває $HOME і $PATH. Guard '! ... grep' боронить
# від дублювання при повторному reload (Prefix r). На Windows/psmux шлях може не
# існувати — зайвий елемент PATH нешкідливий.
if-shell '! echo "$PATH" | grep -q "/\.local/bin"' 'set-environment -g PATH "$HOME/.local/bin:$PATH"'

# Нумерація з 1, а не з 0 (ближче до клавіатури).
set -g base-index 1
setw -g pane-base-index 1

# ============================================================
# PREFIX KEY
# ============================================================
# C-Space зручніше за C-b. Якщо буде конфлікт із Claude Code
# або autocomplete у терміналі — закоментуй ці три рядки і
# розкоментуй блок з C-a нижче.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Альтернатива (screen-style):
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# ============================================================
# RELOAD CONFIG
# ============================================================
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ============================================================
# SPLITS (відкривати у поточній директорії панелі)
# ============================================================
# За замовчуванням split відкриває $HOME — а нам треба cwd панелі,
# щоб одразу продовжувати працювати у тому ж проєкті.
bind '"' split-window -v -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"

# Зручніші мнемонічні біндинги (| вертикально, - горизонтально).
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ============================================================
# PANE NAVIGATION (vim-style)
# ============================================================
# Працює і без vim-tmux-navigator, але плагін нижче робить ці
# самі h/j/k/l БЕЗ префікса і безшовно з Neovim.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ============================================================
# WINDOW NAVIGATION
# ============================================================
# Alt+H / Alt+L — швидкий перехід між вікнами без префікса.
bind -n M-H previous-window
bind -n M-L next-window

# Шифт+стрілки навмисно НЕ біндимо — конфліктує з виділенням
# тексту мишею у багатьох терміналах.

# ============================================================
# COPY MODE (vim-style) + СИСТЕМНИЙ БУФЕР
# ============================================================
# Один "істинний" буфер — системний. y / Enter / drag мишею кладуть
# виділення у CLIPBOARD *і* PRIMARY, а Prefix ] вставляє звідти ж, тож
# tmux, nvim, браузер і термінал зходяться в одному місці.
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# База (працює скрізь через set-clipboard/OSC 52 — напр. Windows Terminal + psmux).
bind-key -T copy-mode-vi y     send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# Linux/Wayland: заворачуємо у wl-copy-both -> CLIPBOARD + PRIMARY одночасно.
# GNOME Terminal не вміє OSC 52, тож на цьому боксі це і є реальний шлях копії.
# Guarded: якщо wl-copy-both немає (Windows/psmux) — лишається база вище.
# Три ОКРЕМІ if-shell (без ';' і без переносів рядка): tmux-парсер плутається
# у вкладених лапках/продовженнях і губить суфікс '-both' — тож тримаємо кожен
# bind однорядковим.
# wl-copy-both резолвиться за bare-ім'ям, бо ~/.local/bin додано в PATH оточення
# tmux вище (див. "PATH tmux-сервера") — інакше сервер зі "голим" PATH дав би rc 127.
if-shell 'command -v wl-copy-both >/dev/null 2>&1' "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel wl-copy-both"
if-shell 'command -v wl-copy-both >/dev/null 2>&1' "bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel wl-copy-both"
if-shell 'command -v wl-copy-both >/dev/null 2>&1' "bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel wl-copy-both"

# Prefix ] — вставка з СИСТЕМНОГО буфера (а не лише з внутрішнього tmux-буфера),
# тож підхоплює і те, що скопійовано у браузері/VSCode. На Linux тягнемо через
# wl-paste; інакше — звичайний paste-buffer (внутрішній, наповнений OSC 52).
if-shell 'command -v wl-paste >/dev/null 2>&1' \
  "bind-key ] run-shell 'wl-paste --no-newline | tmux load-buffer - && tmux paste-buffer'" \
  "bind-key ] paste-buffer"

# ============================================================
# POPUPS (ephemeral UI: lazygit / scratch shell)
# ============================================================
# display-popup замість постійних панелей: overlay поверх вікна, закрив —
# і слідів нема. -d = cwd активної панелі, тож lazygit відкриває саме той
# репозиторій, у якому зараз працюєш.
# lazygit встановлено через `go install` → ~/go/bin, якого немає у PATH
# tmux-сервера (та сама пастка, що і з ~/.local/bin вище) — додаємо один раз.
if-shell '! echo "$PATH" | grep -q "/go/bin"' 'set-environment -g PATH "$HOME/go/bin:$PATH"'

# Prefix g — lazygit у попапі на 90% екрана (закривається по q).
# Guarded: на машині без lazygit біндинг просто не створюється.
if-shell 'command -v lazygit >/dev/null 2>&1 || [ -x "$HOME/go/bin/lazygit" ]' 'bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"'

# Prefix S — тимчасовий shell-попап у cwd активної панелі (вийшов — зник).
bind S display-popup -d "#{pane_current_path}" -w 80% -h 75% -E

# ============================================================
# THEME (Catppuccin)
# ============================================================
# Використовуємо ОФІЦІЙНИЙ catppuccin (не форк dreamsofcode-io),
# у новій версії все, заради чого Dreams of Code робив форк,
# вже є з коробки + більше опцій статус-бару.
set -g @catppuccin_flavour 'mocha'  # mocha | macchiato | frappe | latte
set -g @catppuccin_window_status_style "rounded"

# Що показувати справа у статус-барі:
set -g @catppuccin_status_modules_right "directory session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "

# ============================================================
# PLUGINS (TPM)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
# tmux-yank вантажиться в самому низу (після TPM) і перебиває наші copy-mode
# біндинги для y та миші. Щоб шлях копії був РІВНО один, женемо його через той
# самий хелпер — CLIPBOARD + PRIMARY. ВАЖЛИВО: саме @override_copy_command, а не
# @custom_copy_command — останній у tmux-yank є ЛИШЕ фоллбеком (спрацьовує, тільки
# коли немає wl-copy/xsel/xclip), тож при наявному wl-copy його б проігнорували.
# @override_copy_command перевіряється ПЕРШИМ. На Windows/psmux хелпера немає й
# tmux-yank не вантажиться (TPM під guard), тож опція там просто ігнорується.
set -g @override_copy_command 'wl-copy-both'

# Збереження/відновлення сесій — рятує при ребуті,
# особливо для довгоживучих Claude Code сесій.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @continuum-boot 'on'

# Fuzzy-пошук сесій/вікон/панелей (prefix + o за замовчуванням).
# Якщо одночасно йде кілька проєктів з Claude Code — must have.
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'

# Initialize TPM (тримай у самому низу!)
# Guarded: only runs where TPM exists (tmux), no-op on psmux / fresh machines.
if-shell '[ -f ~/.tmux/plugins/tpm/tpm ]' "run '~/.tmux/plugins/tpm/tpm'"
