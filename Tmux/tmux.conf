# ============================================================
# Managed in dotfiles. OS-independent: the same file drives tmux
# (Linux/macOS) and psmux (Windows), which also reads a tmux-style config.
# The PLUGINS section at the bottom is TPM/tmux-only — psmux has no TPM, so
# that part is guarded and simply no-ops there.
# ============================================================

# ============================================================
# TERMINAL & COLORS
# ============================================================
# tmux-256color як внутрішній термінал tmux + true color overrides.
# RGB-override потрібен для коректних кольорів у Neovim (undercurl,
# diagnostics highlights), а *:Tc покриває більшість сучасних
# емуляторів (Alacritty, WezTerm, Ghostty, kitty, iTerm2).
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-overrides ",*:RGB"

# ============================================================
# CORE BEHAVIOR (важливо для Neovim + Claude Code)
# ============================================================
# Без затримки після Esc — інакше у Neovim Esc лагає на 50-500ms.
set -sg escape-time 0

# Focus events — щоб Neovim автоматично reload-ив файли,
# які змінив Claude Code ззовні (autoread працює лише з цим).
set -g focus-events on

# Великий scrollback — Claude Code виводить багато тексту.
set -g history-limit 50000

# Мишка: клік по панелях/вікнах, scroll wheel у buffer.
set -g mouse on

# Renumber windows коли якесь закриваєш (1,2,4 → 1,2,3).
set -g renumber-windows on

# Нумерація з 1, а не з 0 (ближче до клавіатури).
set -g base-index 1
setw -g pane-base-index 1

# ============================================================
# PREFIX KEY
# ============================================================
# C-Space зручніше за C-b. Якщо буде конфлікт із Claude Code
# або autocomplete у терміналі — закоментуй ці три рядки і
# розкоментуй блок з C-a нижче.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Альтернатива (screen-style):
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# ============================================================
# RELOAD CONFIG
# ============================================================
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ============================================================
# SPLITS (відкривати у поточній директорії панелі)
# ============================================================
# За замовчуванням split відкриває $HOME — а нам треба cwd панелі,
# щоб одразу продовжувати працювати у тому ж проєкті.
bind '"' split-window -v -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"

# Зручніші мнемонічні біндинги (| вертикально, - горизонтально).
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ============================================================
# PANE NAVIGATION (vim-style)
# ============================================================
# Працює і без vim-tmux-navigator, але плагін нижче робить ці
# самі h/j/k/l БЕЗ префікса і безшовно з Neovim.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ============================================================
# WINDOW NAVIGATION
# ============================================================
# Alt+H / Alt+L — швидкий перехід між вікнами без префікса.
bind -n M-H previous-window
bind -n M-L next-window

# Шифт+стрілки навмисно НЕ біндимо — конфліктує з виділенням
# тексту мишею у багатьох терміналах.

# ============================================================
# COPY MODE (vim-style)
# ============================================================
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ============================================================
# THEME (Catppuccin)
# ============================================================
# Використовуємо ОФІЦІЙНИЙ catppuccin (не форк dreamsofcode-io),
# у новій версії все, заради чого Dreams of Code робив форк,
# вже є з коробки + більше опцій статус-бару.
set -g @catppuccin_flavour 'mocha'  # mocha | macchiato | frappe | latte
set -g @catppuccin_window_status_style "rounded"

# Що показувати справа у статус-барі:
set -g @catppuccin_status_modules_right "directory session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "

# ============================================================
# PLUGINS (TPM)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

# Збереження/відновлення сесій — рятує при ребуті,
# особливо для довгоживучих Claude Code сесій.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @continuum-boot 'on'

# Fuzzy-пошук сесій/вікон/панелей (prefix + o за замовчуванням).
# Якщо одночасно йде кілька проєктів з Claude Code — must have.
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'

# Initialize TPM (тримай у самому низу!)
# Guarded: only runs where TPM exists (tmux), no-op on psmux / fresh machines.
if-shell '[ -f ~/.tmux/plugins/tpm/tpm ]' "run '~/.tmux/plugins/tpm/tpm'"
